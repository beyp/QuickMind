version: "3.9"

services:
  quickmind:
    build: .
    container_name: quickmind
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
      - ./logs:/app/logs
    environment:
      - QUICKMIND_HOST=0.0.0.0
      - QUICKMIND_PORT=8765
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  default:
    name: quickmind-network
