app:
  name: QuickMind
  version: "1.5.0"
  theme: dark          # dark | light
  color_accent: "#1E90FF"
  font_scale: 1.0  # 1.0=normal 1.1=+10% 1.2=+20% 1.3=+30%
  default_view: "kanban"   # Vue Kanban au démarrage
  # default_view: "list"   # Vue liste au démarrage

database:
  path: "data/quickmind.db"

attachments:
  path: "data/attachments"

scheduler:
  check_interval_seconds: 30
  auto_archive_done_days: 7  # archiver les terminees apres N jours (0=desactive)

api:
  port: 8765
  enabled: true

updater:
  enabled: true
  github_owner: "beyp"
  github_repo: "QuickMind"
  check_on_startup: true
  github_token: ""
