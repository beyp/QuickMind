app:
  name: QuickMind
  version: "1.4.0"
  theme: dark          # dark | light
  color_accent: "#1E90FF"
  default_view: "kanban"   # Vue Kanban au démarrage
  # default_view: "list"   # Vue liste au démarrage

database:
  path: "data/quickmind.db"

attachments:
  path: "data/attachments"

scheduler:
  check_interval_seconds: 30

updater:
  enabled: true
  github_owner: "beyp"
  github_repo: "QuickMind"
  check_on_startup: true
  github_token: ""
